version: '3.8'
services:
  memgraph:
    image: memgraph/memgraph-platform:latest
    ports:
      - "7687:7687"
      - "7444:7444"
      - "3000:3000"
    volumes:
      - mg_data:/var/lib/memgraph
    environment:
      - MEMGRAPH_USER=admin
      - MEMGRAPH_PASSWORD=admin
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  mg_data:
